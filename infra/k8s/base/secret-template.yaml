# This is a template file. DO NOT commit actual secrets to Git!
# Create or update the secret using kubectl:
#
# kubectl create secret generic charno-secrets \
#   --from-literal=db_user=YOUR_DB_USER \
#   --from-literal=db_password=YOUR_DB_PASSWORD \
#   --from-literal=api_key=YOUR_API_KEY \
#   --from-literal=igdb_client_id=YOUR_IGDB_CLIENT_ID \
#   --from-literal=igdb_client_secret=YOUR_IGDB_CLIENT_SECRET \
#   -n web
#
# To add IGDB creds to an existing secret:
#   kubectl patch secret charno-secrets -n web \
#     --type=json \
#     -p='[{"op":"add","path":"/data/igdb_client_id","value":"'$(echo -n YOUR_CLIENT_ID | base64)'"},
#          {"op":"add","path":"/data/igdb_client_secret","value":"'$(echo -n YOUR_CLIENT_SECRET | base64)'"}]'
#
# igdb_client_id / igdb_client_secret are OPTIONAL — without them the
# rom-scanner CronJob will scan for new files but skip IGDB scraping.
# Get credentials at: https://api.igdb.com (requires a free Twitch Dev account)

apiVersion: v1
kind: Secret
metadata:
  name: charno-secrets
  labels:
    app: web
type: Opaque
stringData:
  db_user: "REPLACE_WITH_YOUR_DB_USER"
  db_password: "REPLACE_WITH_YOUR_DB_PASSWORD"
  api_key: "REPLACE_WITH_YOUR_API_KEY"
  igdb_client_id: "REPLACE_WITH_YOUR_IGDB_CLIENT_ID"
  igdb_client_secret: "REPLACE_WITH_YOUR_IGDB_CLIENT_SECRET"
