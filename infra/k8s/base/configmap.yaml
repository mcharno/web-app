apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-config
  namespace: web
  labels:
    app: web-app
data:
  # Database configuration
  db_host: "postgres-lb.database.svc.cluster.local"
  db_port: "5432"
  db_name: "web"

  # API URL for frontend (update with your domain)
  api_url: "http://charno-backend.web.svc.cluster.local:3080"
