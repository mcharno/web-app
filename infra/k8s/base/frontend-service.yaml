apiVersion: v1
kind: Service
metadata:
  name: web-app-frontend
  namespace: web
  labels:
    app: web-app-frontend
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: web-app-frontend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  sessionAffinity: None
