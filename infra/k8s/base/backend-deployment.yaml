apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-backend
  namespace: web
  labels:
    app: web-app-backend
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: web-app-backend
  template:
    metadata:
      labels:
        app: web-app-backend
        component: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: backend
        image: ghcr.io/mcharno/web-app-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3080
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3080"
        - name: PHOTOS_DIR
          value: "/data/photos"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: web-app-config
              key: db_host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: web-app-config
              key: db_port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: web-app-config
              key: db_name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: web-app-secrets
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: web-app-secrets
              key: db_password
        volumeMounts:
        - name: photos
          mountPath: /data/photos
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
      volumes:
      - name: photos
        persistentVolumeClaim:
          claimName: photos-pvc
